name: Build and Deploy to GitHub Pages

on:
  workflow_dispatch:
    inputs:
      rawdata_base64:
        description: 'Optional: base64 encoded src/routes/rawData.json content'
        required: false
        type: string
      commit_message:
        description: 'Optional commit message when rawData.json is updated by this workflow'
        required: false
        default: 'chore: update rawData.json from workflow dispatch'
        type: string
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'static/**'
      - 'package.json'
      - 'package-lock.json'
      - 'svelte.config.js'
      - 'vite.config.ts'
      - '.github/workflows/deploy-pages.yml'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Update rawData.json from dispatch input (optional)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.rawdata_base64 != '' }}
        shell: bash
        run: |
          echo "${{ github.event.inputs.rawdata_base64 }}" | base64 --decode > src/routes/rawData.json

      - name: Commit updated rawData.json (optional)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.rawdata_base64 != '' }}
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: ${{ github.event.inputs.commit_message }}
          file_pattern: src/routes/rawData.json

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
