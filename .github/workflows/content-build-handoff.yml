name: Content Build Handoff

on:
  repository_dispatch:
    types:
      - content_update_requested
  workflow_dispatch:
    inputs:
      request_id:
        description: Optional request id for tracing
        required: false
        type: string
      admin_id:
        description: Optional admin id for tracing
        required: false
        type: string
      publish_summary:
        description: Optional summary describing this publish
        required: false
        type: string
      rawdata_base64:
        description: Optional base64 encoded src/routes/rawData.json payload
        required: false
        type: string
      snapshot_url:
        description: Optional URL to fetch rawData.json snapshot
        required: false
        type: string
      snapshot_sha256:
        description: Optional sha256 checksum for downloaded snapshot
        required: false
        type: string
permissions:
  contents: write
  actions: read

concurrency:
  group: content-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-handoff:
    runs-on: ubuntu-latest
    env:
      SOURCE_REF: ${{ github.ref_name }}
      REQUEST_ID: ${{ github.event.client_payload.request_id || github.event.inputs.request_id || github.run_id }}
      ADMIN_ID: ${{ github.event.client_payload.admin_id || github.event.inputs.admin_id || 'unknown-admin' }}
      PUBLISH_SUMMARY: ${{ github.event.client_payload.publish_summary || github.event.inputs.publish_summary || '' }}
      RAWDATA_BASE64: ${{ github.event.client_payload.rawdata_base64 || github.event.inputs.rawdata_base64 }}
      SNAPSHOT_URL: ${{ github.event.client_payload.snapshot_url || github.event.inputs.snapshot_url }}
      SNAPSHOT_SHA256: ${{ github.event.client_payload.snapshot_sha256 || github.event.inputs.snapshot_sha256 }}
      SNAPSHOT_BEARER: ${{ secrets.CONTENT_SNAPSHOT_BEARER }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Apply updated content payload
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${RAWDATA_BASE64}" ]; then
            echo "Applying rawData.json from base64 payload"
            printf '%s' "${RAWDATA_BASE64}" | base64 --decode > src/routes/rawData.json
          elif [ -n "${SNAPSHOT_URL}" ]; then
            echo "Fetching rawData.json from snapshot URL"
            if [ -n "${SNAPSHOT_BEARER}" ]; then
              curl -fsSL -H "Authorization: Bearer ${SNAPSHOT_BEARER}" "${SNAPSHOT_URL}" -o src/routes/rawData.json
            else
              curl -fsSL "${SNAPSHOT_URL}" -o src/routes/rawData.json
            fi
          else
            echo "No payload supplied, using repository src/routes/rawData.json"
          fi

      - name: Validate snapshot checksum
        if: ${{ env.SNAPSHOT_SHA256 != '' }}
        shell: bash
        run: |
          set -euo pipefail
          echo "${SNAPSHOT_SHA256}  src/routes/rawData.json" | sha256sum -c -

      - name: Log and clear editTrace
        id: edit_trace
        shell: bash
        run: |
          set -euo pipefail
          node <<'EOF'
          const fs = require('fs');
          const path = require('path');
          const crypto = require('crypto');

          const rawDataPath = path.join(process.cwd(), 'src', 'routes', 'rawData.json');
          const logPath = path.join(process.cwd(), 'static', 'edit-trace.jsonl');
          const manifestPath = path.join(process.cwd(), 'static', 'content-versions', 'manifest.json');
          const snapshotsBaseDir = path.join(process.cwd(), 'static', 'content-versions', 'snapshots');

          const requestId = process.env.REQUEST_ID;
          const adminId = process.env.ADMIN_ID;
          const sourceRef = process.env.SOURCE_REF;
          const publishSummary = process.env.PUBLISH_SUMMARY || '';
          const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;

          const rawDataContent = fs.readFileSync(rawDataPath, 'utf8');
          const rawData = JSON.parse(rawDataContent);
          const traces = Array.isArray(rawData?.config?.editTrace) ? rawData.config.editTrace : [];

          fs.mkdirSync(path.dirname(logPath), { recursive: true });

          const loggedAt = new Date().toISOString();

          if (traces.length > 0) {
            const lines = traces.map((trace) => JSON.stringify({
              loggedAt,
              requestId,
              adminId,
              sourceRef,
              trace
            }));
            fs.appendFileSync(logPath, `${lines.join('\n')}\n`);

            // Write content snapshot
            const now = new Date();
            const year = now.getUTCFullYear().toString();
            const ts = now.toISOString().replace(/[-:]/g, '').replace(/\.\d+Z$/, 'Z');
            const versionId = `${ts}_${requestId}`;
            const snapshotDir = path.join(snapshotsBaseDir, year);
            fs.mkdirSync(snapshotDir, { recursive: true });
            const snapshotRelPath = `content-versions/snapshots/${year}/${versionId}.json`;
            fs.writeFileSync(path.join(snapshotDir, `${versionId}.json`), rawDataContent);
            const contentSha256 = crypto.createHash('sha256').update(rawDataContent).digest('hex');

            // Append to manifest
            let manifest = [];
            if (fs.existsSync(manifestPath)) {
              try { manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8')); } catch {}
            }
            manifest.push({
              versionId,
              publishedAt: loggedAt,
              publishedBy: adminId,
              requestId,
              sourceRef,
              summary: publishSummary,
              editTraceCount: traces.length,
              snapshotPath: snapshotRelPath,
              contentSha256,
              buildRunUrl: runUrl
            });
            fs.mkdirSync(path.dirname(manifestPath), { recursive: true });
            fs.writeFileSync(manifestPath, JSON.stringify(manifest, null, 2) + '\n');

            fs.appendFileSync(process.env.GITHUB_OUTPUT, `version_id=${versionId}\n`);
          }

          if (!rawData.config) {
            rawData.config = {};
          }
          rawData.config.editTrace = [];
          fs.writeFileSync(rawDataPath, JSON.stringify(rawData, null, '\t') + '\n');

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `trace_count=${traces.length}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `log_path=static/edit-trace.jsonl\n`);
          EOF

      - name: Commit editTrace log and clear source editTrace
        if: ${{ steps.edit_trace.outputs.trace_count != '0' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/routes/rawData.json static/edit-trace.jsonl static/content-versions/
          git commit -m "chore: archive editTrace and snapshot for request ${REQUEST_ID}"
          git push origin "HEAD:${SOURCE_REF}"

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Package build artifact
        id: package_artifact
        shell: bash
        run: |
          set -euo pipefail
          tar -czf site-build.tar.gz -C build .
          BUILD_SHA256=$(sha256sum site-build.tar.gz | awk '{print $1}')
          echo "${BUILD_SHA256}" > site-build.tar.gz.sha256
          echo "build_sha256=${BUILD_SHA256}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        id: upload_artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-build-${{ github.run_id }}
          path: |
            site-build.tar.gz
            site-build.tar.gz.sha256
          retention-days: 14

      - name: Resolve artifact metadata
        id: artifact_meta
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const run_id = context.runId;
            const expectedName = `site-build-${run_id}`;
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({ owner, repo, run_id });
            const artifact = artifacts.data.artifacts.find((a) => a.name === expectedName);
            if (!artifact) {
              core.setFailed(`Artifact not found: ${expectedName}`);
              return;
            }
            core.setOutput('artifact_id', String(artifact.id));
            core.setOutput('artifact_name', artifact.name);
            core.setOutput('artifact_archive_url', artifact.archive_download_url);
            core.setOutput('run_url', `${context.serverUrl}/${owner}/${repo}/actions/runs/${run_id}`);

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3 # Use a standard action
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
